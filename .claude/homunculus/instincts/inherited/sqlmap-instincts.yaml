# Sqlmap Workflow Core Settings Paired Update

## Action

Follow the core-settings-paired-update workflow:
1. Edit lib/core/settings.py to update/add/remove a setting or constant.
2. Edit one or more related files (e.g., lib/core/common.py, lib/request/connect.py, plugins/dbms/*/fingerprint.py, lib/core/agent.py, etc.) to implement or support the change.
3. Commit both changes together with a reference to the issue or feature.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~8x per month
- Files: lib/core/settings.py, lib/core/common.py, lib/request/connect.py

